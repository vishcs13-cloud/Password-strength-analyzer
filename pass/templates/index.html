<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Shapes -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <!-- Header Section -->
        <header>
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>Password Strength</h1>
            <p class="subtitle">Check how secure your password is</p>
        </header>

        <!-- Password Input Section -->
        <div class="input-section">
            <div class="password-container">
                <input 
                    type="password" 
                    id="passwordInput" 
                    placeholder="Enter your password"
                    autocomplete="off"
                >
                <button id="toggleBtn" class="toggle-btn" onclick="togglePassword()">
                    <span id="eyeIcon">👁️</span>
                </button>
            </div>
            
            <!-- Password Requirements -->
            <div class="requirements">
                <div class="req-item" id="req-length">
                    <span class="req-icon">○</span>
                    <span>At least 8 characters</span>
                </div>
                <div class="req-item" id="req-upper">
                    <span class="req-icon">○</span>
                    <span>Uppercase letter (A-Z)</span>
                </div>
                <div class="req-item" id="req-lower">
                    <span class="req-icon">○</span>
                    <span>Lowercase letter (a-z)</span>
                </div>
                <div class="req-item" id="req-number">
                    <span class="req-icon">○</span>
                    <span>Number (0-9)</span>
                </div>
                <div class="req-item" id="req-special">
                    <span class="req-icon">○</span>
                    <span>Special character (!@#$)</span>
                </div>
            </div>
        </div>

        <!-- Strength Meter Section -->
        <div class="meter-section">
            <div class="meter-container">
                <div class="meter-fill" id="meterFill"></div>
            </div>
            <div class="meter-labels">
                <span>Weak</span>
                <span>Fair</span>
                <span>Strong</span>
                <span>Very Strong</span>
            </div>
        </div>

        <!-- Result Section -->
        <div class="result-section" id="resultSection">
            <div class="result-card">
                <div class="result-header">
                    <span class="result-icon" id="resultIcon"></span>
                    <span class="result-level" id="resultLevel"></span>
                </div>
                <div class="score-display">
                    Score: <span id="scoreValue">0</span>%
                </div>
                <div class="feedback-list" id="feedbackList">
                    <!-- Feedback items will appear here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>🔒 Your password is your Security!</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
